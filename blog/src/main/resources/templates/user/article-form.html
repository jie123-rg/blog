<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${a==null?'发表文章':'修改文章'}"></title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        :root {
            --primary-color: #4361ee;
            --light-color: #f8f9fa;
            --dark-color: #212529;
        }

        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #e4edf5 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        .navbar {
            background: rgba(255, 255, 255, 0.95) !important;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
            border-bottom: 1px solid rgba(67, 97, 238, 0.1);
        }

        .navbar-brand {
            font-weight: 700;
            font-size: 1.5rem;
            background: linear-gradient(135deg, #4361ee 0%, #3a0ca3 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .form-container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            padding: 2.5rem;
            margin-top: 2rem;
            border: 1px solid rgba(0,0,0,0.05);
        }

        .page-title {
            font-weight: 700;
            color: var(--dark-color);
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 3px solid var(--primary-color);
        }

        .form-label {
            font-weight: 600;
            color: var(--dark-color);
            margin-bottom: 0.5rem;
        }

        .form-control, .form-select {
            border: 2px solid #e9ecef;
            border-radius: 8px;
            padding: 0.75rem;
            transition: all 0.3s ease;
        }

        .form-control:focus, .form-select:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 0.25rem rgba(67, 97, 238, 0.25);
        }

        textarea.form-control {
            min-height: 300px;
            resize: vertical;
        }

        .btn-success {
            background: linear-gradient(135deg, #20c997 0%, #17a589 100%);
            border: none;
            padding: 0.75rem 2rem;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(32, 201, 151, 0.3);
        }

        .btn-outline-secondary {
            border-width: 2px;
            padding: 0.75rem 2rem;
            border-radius: 8px;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .btn-outline-secondary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(108, 117, 125, 0.2);
        }

        .form-actions {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid #eee;
        }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-light">
    <div class="container">
        <a class="navbar-brand" href="/">
            <i class="bi bi-pen me-2"></i>我的博客
        </a>
        <ul class="navbar-nav ms-auto">
            <li class="nav-item">
                <a class="nav-link" href="/back">
                    <i class="bi bi-arrow-left me-1"></i>返回
                </a>
            </li>
        </ul>
    </div>
</nav>

<div class="container">
    <div class="form-container">
        <h2 class="page-title">
            <i class="bi bi-pencil-square me-2"></i>
            <span th:text="${a==null?'发表新文章':'修改文章'}"></span>
        </h2>

        <form method="post" th:action="@{/user/article}">
            <input type="hidden" name="id" th:if="${a!=null}" th:value="${a.id}">

            <div class="mb-4">
                <label class="form-label">标题</label>
                <input type="text" name="title" class="form-control"
                       th:value="${a!=null?a.title:''}"
                       placeholder="请输入文章标题" required>
            </div>

            <div class="mb-4">
                <label class="form-label">分类</label>
                <select name="categoryId" class="form-select" required>
                    <option value="" disabled th:if="${a==null}">请选择分类</option>
                    <option th:each="c:${categories}"
                            th:value="${c.id}"
                            th:text="${c.name}"
                            th:selected="${a!=null and a.categoryId==c.id}">
                    </option>
                </select>
            </div>

            <div class="mb-4">
                <label class="form-label">内容</label>
                <textarea name="content" class="form-control" rows="12"
                          placeholder="在这里写下您的文章内容..." required
                >[[${a!=null?a.content:''}]]</textarea>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-success">
                    <i class="bi bi-save me-1"></i>
                    <span th:text="${a==null?'发布文章':'保存修改'}"></span>
                </button>
                <a href="/user/article" class="btn btn-outline-secondary">
                    <i class="bi bi-x-circle me-1"></i>取消
                </a>
            </div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
