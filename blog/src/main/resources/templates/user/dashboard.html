<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>用户后台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        :root {
            --primary-color: #4361ee;
            --secondary-color: #3a0ca3;
            --light-color: #f8f9fa;
            --dark-color: #212529;
        }

        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #e4edf5 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        .navbar {
            background: rgba(255, 255, 255, 0.95) !important;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
            border-bottom: 1px solid rgba(67, 97, 238, 0.1);
        }

        .navbar-brand {
            font-weight: 700;
            font-size: 1.5rem;
            background: linear-gradient(135deg, #4361ee 0%, #3a0ca3 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .welcome-section {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            padding: 2.5rem;
            margin-top: 2rem;
            text-align: center;
            border: 1px solid rgba(0,0,0,0.05);
        }

        .welcome-icon {
            font-size: 3rem;
            background: linear-gradient(135deg, #4361ee 0%, #3a0ca3 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 1rem;
        }

        .welcome-title {
            font-weight: 700;
            color: var(--dark-color);
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
        }

        .welcome-text {
            color: #6c757d;
            font-size: 1.1rem;
            margin-bottom: 2rem;
        }

        .dashboard-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
            padding: 2rem;
            height: 100%;
            border: 1px solid #eee;
            transition: all 0.3s ease;
            text-align: center;
        }

        .dashboard-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.1);
            border-color: var(--primary-color);
        }

        .card-icon {
            font-size: 2.5rem;
            color: var(--primary-color);
            margin-bottom: 1.5rem;
        }

        .card-title {
            font-weight: 600;
            color: var(--dark-color);
            font-size: 1.3rem;
            margin-bottom: 1rem;
        }

        .card-text {
            color: #6c757d;
            margin-bottom: 1.5rem;
            line-height: 1.6;
        }

        .btn-primary {
            background: linear-gradient(135deg, #4361ee 0%, #3a0ca3 100%);
            border: none;
            padding: 0.75rem 2rem;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(67, 97, 238, 0.3);
        }

        .nav-link {
            color: var(--dark-color) !important;
            font-weight: 500;
            padding: 0.5rem 1rem !important;
            border-radius: 6px;
            transition: all 0.3s ease;
        }

        .nav-link:hover {
            color: var(--primary-color) !important;
            background: rgba(67, 97, 238, 0.08);
        }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-light">
    <div class="container">
        <a class="navbar-brand" href="/">
            <i class="bi bi-pen me-2"></i>我的博客
        </a>
        <ul class="navbar-nav ms-auto">
            <li class="nav-item">
                <a class="nav-link" href="/back">
                    <i class="bi bi-arrow-left me-1"></i>返回
                </a>
            </li>
        </ul>
    </div>
</nav>

<div class="container">
    <div class="welcome-section">
        <div class="welcome-icon">
            <i class="bi bi-person-circle"></i>
        </div>
        <h2 class="welcome-title">用户后台中心</h2>
        <p class="welcome-text">管理您的文章和评论，开始创作之旅</p>
    </div>

    <div class="row mt-5 g-4">
        <div class="col-md-6">
            <div class="dashboard-card">
                <div class="card-icon">
                    <i class="bi bi-file-text"></i>
                </div>
                <h3 class="card-title">文章管理</h3>
                <p class="card-text">管理您发布的所有文章，包括创建新文章、编辑现有文章和删除不需要的内容</p>
                <a href="/user/article" class="btn btn-primary">
                    <i class="bi bi-arrow-right me-2"></i>进入文章管理
                </a>
            </div>
        </div>

        <div class="col-md-6">
            <div class="dashboard-card">
                <div class="card-icon">
                    <i class="bi bi-chat-square-text"></i>
                </div>
                <h3 class="card-title">评论管理</h3>
                <p class="card-text">查看和管理您文章的评论，回复读者反馈，管理评论内容</p>
                <a href="/user/comments" class="btn btn-primary">
                    <i class="bi bi-arrow-right me-2"></i>进入评论管理
                </a>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
