<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>我的评论</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        :root {
            --primary-color: #4361ee;
            --light-color: #f8f9fa;
            --dark-color: #212529;
        }

        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #e4edf5 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        .navbar {
            background: rgba(255, 255, 255, 0.95) !important;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
            border-bottom: 1px solid rgba(67, 97, 238, 0.1);
        }

        .navbar-brand {
            font-weight: 700;
            font-size: 1.5rem;
            background: linear-gradient(135deg, #4361ee 0%, #3a0ca3 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .container {
            padding-top: 2rem;
        }

        .page-title {
            font-weight: 700;
            color: var(--dark-color);
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 3px solid var(--primary-color);
        }

        .comment-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            border: 1px solid #eee;
            transition: all 0.3s ease;
        }

        .comment-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
            border-color: var(--primary-color);
        }

        .article-link {
            font-weight: 600;
            color: var(--primary-color);
            text-decoration: none;
            font-size: 1.1rem;
            transition: all 0.3s ease;
        }

        .article-link:hover {
            color: #3a0ca3;
            text-decoration: underline;
        }

        .comment-content {
            color: #444;
            margin: 1rem 0;
            line-height: 1.6;
            padding: 1rem;
            background: #f8f9fa;
            border-radius: 8px;
        }

        .comment-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #6c757d;
            font-size: 0.9rem;
        }

        .btn-outline-danger {
            border-width: 2px;
            font-weight: 500;
            border-radius: 6px;
            transition: all 0.3s ease;
        }

        .btn-outline-danger:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(220, 53, 69, 0.3);
        }

        .btn-outline-secondary {
            border-width: 2px;
            font-weight: 500;
            border-radius: 6px;
            transition: all 0.3s ease;
        }

        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: #6c757d;
        }

        .empty-state i {
            font-size: 3rem;
            margin-bottom: 1rem;
            color: #adb5bd;
        }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-light">
    <div class="container">
        <a class="navbar-brand" href="/">
            <i class="bi bi-pen me-2"></i>我的博客
        </a>
        <div>
            <a href="/user/dashboard" class="btn btn-outline-secondary">
                <i class="bi bi-arrow-left me-1"></i>返回
            </a>
        </div>
    </div>
</nav>

<div class="container">
    <h2 class="page-title">
        <i class="bi bi-chat-square-text me-2"></i>我的评论
    </h2>

    <div th:if="${comments.empty}" class="empty-state">
        <i class="bi bi-chat-dots"></i>
        <h4 class="mt-3">暂无评论</h4>
        <p class="text-muted">您还没有发表过任何评论</p>
        <a href="/" class="btn btn-primary mt-3">去浏览文章</a>
    </div>

    <div th:unless="${comments.empty}">
        <div class="comment-card" th:each="comment:${comments}">
            <a th:href="@{/article/{id}(id=${comment.articleId})}"
               th:text="${articleMap.get(comment.articleId)} != null ? ${articleMap.get(comment.articleId)} : '文章已删除'"
               class="article-link" target="_blank">
            </a>

            <div class="comment-content" th:text="${comment.content}"></div>

            <div class="comment-meta">
                <div>
                    <i class="bi bi-clock me-1"></i>
                    <span th:text="${#temporals.format(comment.createTime,'yyyy年MM月dd日 HH:mm')}"></span>
                </div>
                <div>
                    <a th:href="@{/user/comments/delete/{id}(id=${comment.id})}"
                       class="btn btn-outline-danger btn-sm"
                       onclick="return confirm('确定删除这条评论吗？')">
                        <i class="bi bi-trash me-1"></i>删除
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
