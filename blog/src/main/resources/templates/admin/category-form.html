<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>分类编辑</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        :root {
            --admin-color: #7209b7;
            --light-color: #f8f9fa;
            --dark-color: #212529;
        }

        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #e4edf5 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        .admin-navbar {
            background: rgba(255, 255, 255, 0.95) !important;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
            border-bottom: 3px solid var(--admin-color);
        }

        .admin-brand {
            font-weight: 700;
            font-size: 1.5rem;
            background: linear-gradient(135deg, var(--admin-color) 0%, #560bad 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .nav-link {
            color: var(--dark-color) !important;
            font-weight: 500;
            padding: 0.5rem 1rem !important;
            border-radius: 6px;
            transition: all 0.3s ease;
        }

        .nav-link:hover {
            color: var(--admin-color) !important;
            background: rgba(114, 9, 183, 0.08);
        }

        .form-container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            padding: 2.5rem;
            margin-top: 2rem;
            border: 1px solid rgba(0,0,0,0.05);
            border-top: 4px solid var(--admin-color);
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
        }

        .form-title {
            font-weight: 700;
            color: var(--dark-color);
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 3px solid var(--admin-color);
            text-align: center;
        }

        .form-label {
            font-weight: 600;
            color: var(--dark-color);
            margin-bottom: 0.5rem;
        }

        .form-control {
            border: 2px solid #e9ecef;
            border-radius: 8px;
            padding: 0.75rem;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            border-color: var(--admin-color);
            box-shadow: 0 0 0 0.25rem rgba(114, 9, 183, 0.25);
        }

        .btn-admin {
            background: linear-gradient(135deg, var(--admin-color) 0%, #560bad 100%);
            border: none;
            padding: 0.75rem 2rem;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.3s ease;
            color: white;
            width: 120px;
        }

        .btn-admin:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(114, 9, 183, 0.3);
        }

        .btn-outline-secondary {
            border-width: 2px;
            padding: 0.75rem 2rem;
            border-radius: 8px;
            font-weight: 500;
            transition: all 0.3s ease;
            width: 120px;
        }

        .btn-outline-secondary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(108, 117, 125, 0.2);
        }

        .form-actions {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
            justify-content: center;
        }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg admin-navbar">
    <div class="container">
        <a class="navbar-brand admin-brand" href="/">
            <i class="bi bi-shield-lock me-2"></i>管理员后台
        </a>
        <ul class="navbar-nav ms-auto">
            <li class="nav-item">
                <a class="nav-link" href="/back">
                    <i class="bi bi-arrow-left me-1"></i>返回
                </a>
            </li>
        </ul>
    </div>
</nav>

<div class="container">
    <div class="form-container">
        <h2 class="form-title">
            <i class="bi bi-tag me-2"></i>
            <span th:text="${c == null ? '新增分类' : '修改分类'}"></span>
        </h2>

        <form method="post" th:action="@{/admin/category}">
            <input type="hidden" name="id" th:if="${c != null}" th:value="${c.id}">

            <div class="mb-4">
                <label class="form-label">分类名称</label>
                <input type="text" name="name" class="form-control"
                       th:value="${c != null ? c.name : ''}"
                       placeholder="请输入分类名称" required>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-admin">
                    <i class="bi bi-save me-1"></i>
                    <span th:text="${c == null ? '添加' : '保存'}"></span>
                </button>
                <a href="/admin/category" class="btn btn-outline-secondary">
                    <i class="bi bi-x-circle me-1"></i>返回
                </a>
            </div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
