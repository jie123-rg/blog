<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>发表文章</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        :root {
            --primary-color: #4361ee;
            --secondary-color: #3a0ca3;
            --admin-color: #7209b7;
            --light-color: #f8f9fa;
            --dark-color: #212529;
        }

        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #e4edf5 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        .admin-navbar {
            background: rgba(255, 255, 255, 0.95) !important;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
            border-bottom: 3px solid var(--admin-color);
        }

        .admin-brand {
            font-weight: 700;
            font-size: 1.5rem;
            background: linear-gradient(135deg, var(--admin-color) 0%, #560bad 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .admin-nav-link {
            color: var(--dark-color) !important;
            font-weight: 500;
            padding: 0.5rem 1rem !important;
            margin: 0 0.2rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }

        .admin-nav-link:hover {
            color: var(--admin-color) !important;
            background: rgba(114, 9, 183, 0.08);
            transform: translateY(-1px);
        }

        .admin-container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            padding: 2.5rem;
            margin-top: 2rem;
            border: 1px solid rgba(0,0,0,0.05);
        }

        .admin-title {
            font-weight: 700;
            color: var(--dark-color);
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 3px solid var(--admin-color);
        }

        .form-label {
            font-weight: 600;
            color: var(--dark-color);
            margin-bottom: 0.5rem;
        }

        .form-control, .form-select {
            border: 2px solid #e9ecef;
            border-radius: 8px;
            padding: 0.75rem;
            transition: all 0.3s ease;
        }

        .form-control:focus, .form-select:focus {
            border-color: var(--admin-color);
            box-shadow: 0 0 0 0.25rem rgba(114, 9, 183, 0.25);
        }

        textarea.form-control {
            min-height: 300px;
            resize: vertical;
        }

        .btn-admin {
            background: linear-gradient(135deg, var(--admin-color) 0%, #560bad 100%);
            border: none;
            padding: 0.75rem 2rem;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.3s ease;
            color: white;
        }

        .btn-admin:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(114, 9, 183, 0.3);
            color: white;
        }

        .btn-outline-secondary {
            border-width: 2px;
            padding: 0.75rem 2rem;
            border-radius: 8px;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .btn-outline-secondary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(108, 117, 125, 0.2);
        }

        .form-actions {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid #eee;
        }

        .nav-divider {
            color: #adb5bd;
            margin: 0 0.5rem;
        }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg admin-navbar">
    <div class="container">
        <a class="navbar-brand admin-brand" href="/">
            <i class="bi bi-shield-lock me-2"></i>管理员后台
        </a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link admin-nav-link" href="/admin/article">
                        <i class="bi bi-file-text me-1"></i>文章管理
                    </a>
                </li>
                <span class="nav-divider">|</span>
                <li class="nav-item">
                    <a class="nav-link admin-nav-link" href="/admin/category">
                        <i class="bi bi-tags me-1"></i>分类管理
                    </a>
                </li>
                <span class="nav-divider">|</span>
                <li class="nav-item">
                    <a class="nav-link admin-nav-link" href="/admin/audit">
                        <i class="bi bi-clipboard-check me-1"></i>文章审核
                    </a>
                </li>
                <span class="nav-divider">|</span>
                <li class="nav-item">
                    <a class="nav-link admin-nav-link" href="/back">
                        <i class="bi bi-arrow-left me-1"></i>返回
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container">
    <div class="admin-container">
        <h2 class="admin-title">
            <i class="bi bi-pencil-square me-2"></i>发表文章
        </h2>

        <form method="post" action="/admin/article">
            <div class="mb-4">
                <label class="form-label">标题</label>
                <input type="text" name="title" class="form-control"
                       placeholder="请输入文章标题" required>
            </div>

            <div class="mb-4">
                <label class="form-label">分类</label>
                <select name="categoryId" class="form-select" required>
                    <option value="" disabled selected>请选择文章分类</option>
                    <option th:each="c:${categories}"
                            th:value="${c.id}"
                            th:text="${c.name}">
                    </option>
                </select>
            </div>

            <div class="mb-4">
                <label class="form-label">内容</label>
                <textarea name="content" rows="12" class="form-control"
                          placeholder="在这里写下您的文章内容..." required></textarea>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-admin">
                    <i class="bi bi-save me-1"></i>保存文章
                </button>
                <a href="/admin/article" class="btn btn-outline-secondary">
                    <i class="bi bi-x-circle me-1"></i>取消
                </a>
            </div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
