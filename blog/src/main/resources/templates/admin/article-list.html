<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>文章管理</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        :root {
            --admin-color: #7209b7;
            --light-color: #f8f9fa;
            --dark-color: #212529;
        }

        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #e4edf5 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        .admin-navbar {
            background: rgba(255, 255, 255, 0.95) !important;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
            border-bottom: 3px solid var(--admin-color);
        }

        .admin-brand {
            font-weight: 700;
            font-size: 1.5rem;
            background: linear-gradient(135deg, var(--admin-color) 0%, #560bad 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .container {
            padding-top: 2rem;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 3px solid var(--admin-color);
        }

        .page-title {
            font-weight: 700;
            color: var(--dark-color);
            margin: 0;
        }

        .btn-admin {
            background: linear-gradient(135deg, var(--admin-color) 0%, #560bad 100%);
            border: none;
            padding: 0.6rem 1.5rem;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.3s ease;
            color: white;
        }

        .btn-admin:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(114, 9, 183, 0.3);
        }

        .search-form {
            background: white;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
            padding: 1.5rem;
            margin-bottom: 2rem;
            border: 1px solid #eee;
        }

        .form-control:focus {
            border-color: var(--admin-color);
            box-shadow: 0 0 0 0.25rem rgba(114, 9, 183, 0.25);
        }

        .btn-outline-secondary, .btn-outline-primary {
            border-width: 2px;
            font-weight: 500;
            border-radius: 6px;
            transition: all 0.3s ease;
        }

        .btn-outline-secondary:hover, .btn-outline-primary:hover {
            transform: translateY(-2px);
        }

        .btn-outline-primary:hover {
            box-shadow: 0 4px 15px rgba(13, 110, 253, 0.3);
        }

        .btn-outline-secondary:hover {
            box-shadow: 0 4px 15px rgba(108, 117, 125, 0.3);
        }

        .article-table {
            background: white;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
            overflow: hidden;
            border: 1px solid #eee;
        }

        .table {
            margin: 0;
        }

        .table thead {
            background: linear-gradient(135deg, var(--admin-color) 0%, #560bad 100%);
            color: white;
        }

        .table th {
            border: none;
            padding: 1.2rem 1rem;
            font-weight: 600;
        }

        .table td {
            padding: 1.2rem 1rem;
            vertical-align: middle;
            border-color: #eee;
        }

        .table tbody tr {
            transition: all 0.3s ease;
        }

        .table tbody tr:hover {
            background-color: rgba(114, 9, 183, 0.05);
            transform: translateX(5px);
        }

        .badge {
            padding: 0.5rem 1rem;
            border-radius: 6px;
            font-weight: 500;
        }

        .btn-outline-primary {
            border-width: 2px;
            font-weight: 500;
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }

        .btn-outline-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(13, 110, 253, 0.3);
        }

        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: #6c757d;
            background: white;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
            margin-top: 2rem;
        }

        .empty-state i {
            font-size: 3rem;
            margin-bottom: 1rem;
            color: #adb5bd;
        }

        .nav-link {
            color: var(--dark-color) !important;
            font-weight: 500;
            padding: 0.5rem 1rem !important;
            border-radius: 6px;
            transition: all 0.3s ease;
        }

        .nav-link:hover {
            color: var(--admin-color) !important;
            background: rgba(114, 9, 183, 0.08);
        }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg admin-navbar">
    <div class="container">
        <a class="navbar-brand admin-brand" href="/">
            <i class="bi bi-shield-lock me-2"></i>管理员后台
        </a>
        <ul class="navbar-nav ms-auto">
            <li class="nav-item">
                <a class="nav-link" href="/back">
                    <i class="bi bi-arrow-left me-1"></i>返回
                </a>
            </li>
        </ul>
    </div>
</nav>

<div class="container">
    <div class="page-header">
        <h2 class="page-title">
            <i class="bi bi-file-text me-2"></i>文章管理
        </h2>
        <a class="btn btn-admin" href="/admin/article/publish">
            <i class="bi bi-plus-circle me-1"></i>发表新文章
        </a>
    </div>

    <div class="search-form">
        <form method="get" action="/user/article">
            <div class="input-group">
                <input type="text" name="title" class="form-control"
                       placeholder="请输入文章标题查询" th:value="${title}"
                       style="border-radius: 8px 0 0 8px;">
                <button class="btn btn-outline-secondary" type="submit"
                        style="border-radius: 0;">
                    <i class="bi bi-search"></i> 查询
                </button>
                <a href="/user/article" class="btn btn-outline-primary"
                   style="border-radius: 0 8px 8px 0;">
                    <i class="bi bi-arrow-clockwise"></i> 重置
                </a>
            </div>
        </form>
    </div>

    <div th:if="${list.empty}" class="empty-state">
        <i class="bi bi-file-earmark-text"></i>
        <h4 class="mt-3">暂无文章</h4>
        <p class="text-muted">还没有发表任何文章</p>
        <a href="/admin/article/publish" class="btn btn-admin mt-3">
            <i class="bi bi-plus-circle me-1"></i>开始创作
        </a>
    </div>

    <div th:unless="${list.empty}">
        <div class="article-table">
            <table class="table table-hover">
                <thead>
                <tr>
                    <th>标题</th>
                    <th>状态</th>
                    <th>发布时间</th>
                    <th>操作</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="a:${list}">
                    <td th:text="${a.title}"></td>
                    <td>
                        <span th:switch="${a.status}">
                            <span th:case="0" class="badge bg-warning">待审核</span>
                            <span th:case="1" class="badge bg-success">已通过</span>
                            <span th:case="2" class="badge bg-danger">已拒绝</span>
                        </span>
                    </td>
                    <td th:text="${#temporals.format(a.createTime,'yyyy-MM-dd HH:mm')}"></td>
                    <td>
                        <a th:href="@{/article/{id}(id=${a.id})}"
                           class="btn btn-outline-primary btn-sm"
                           title="查看文章详情">
                            <i class="bi bi-eye"></i> 查看
                        </a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
