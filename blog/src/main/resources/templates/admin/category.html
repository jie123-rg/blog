<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>分类管理</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        :root {
            --admin-color: #7209b7;
            --light-color: #f8f9fa;
            --dark-color: #212529;
        }

        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #e4edf5 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        .admin-navbar {
            background: rgba(255, 255, 255, 0.95) !important;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
            border-bottom: 3px solid var(--admin-color);
        }

        .admin-brand {
            font-weight: 700;
            font-size: 1.5rem;
            background: linear-gradient(135deg, var(--admin-color) 0%, #560bad 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .btn-outline-secondary {
            border-width: 2px;
            font-weight: 500;
            border-radius: 6px;
            transition: all 0.3s ease;
        }

        .btn-outline-secondary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(108, 117, 125, 0.2);
        }

        .container {
            padding-top: 2rem;
        }

        .page-title {
            font-weight: 700;
            color: var(--dark-color);
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 3px solid var(--admin-color);
        }

        .search-form {
            background: white;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
            padding: 1.5rem;
            margin-bottom: 2rem;
            border: 1px solid #eee;
        }

        .form-control:focus, .form-select:focus {
            border-color: var(--admin-color);
            box-shadow: 0 0 0 0.25rem rgba(114, 9, 183, 0.25);
        }

        .btn-outline-primary:hover, .btn-outline-secondary:hover {
            transform: translateY(-2px);
        }

        .btn-outline-primary:hover {
            box-shadow: 0 4px 15px rgba(13, 110, 253, 0.3);
        }

        .btn-outline-secondary:hover {
            box-shadow: 0 4px 15px rgba(108, 117, 125, 0.3);
        }

        .form-section {
            background: white;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
            padding: 2rem;
            margin-bottom: 2rem;
            border: 1px solid #eee;
        }

        .form-label {
            font-weight: 600;
            color: var(--dark-color);
            margin-bottom: 0.5rem;
        }

        .btn-admin {
            background: linear-gradient(135deg, var(--admin-color) 0%, #560bad 100%);
            border: none;
            padding: 0.75rem 2rem;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.3s ease;
            color: white;
        }

        .btn-admin:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(114, 9, 183, 0.3);
        }

        .form-actions {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
        }

        .alert {
            border-radius: 8px;
            border: none;
            box-shadow: 0 3px 10px rgba(0,0,0,0.05);
        }

        .alert-danger {
            background: linear-gradient(135deg, #dc3545 0%, #b02a37 100%);
            color: white;
        }

        .category-table {
            background: white;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
            overflow: hidden;
            border: 1px solid #eee;
        }

        .table {
            margin: 0;
        }

        .table thead {
            background: linear-gradient(135deg, var(--admin-color) 0%, #560bad 100%);
            color: white;
        }

        .table th {
            border: none;
            padding: 1.2rem 1rem;
            font-weight: 600;
        }

        .table td {
            padding: 1.2rem 1rem;
            vertical-align: middle;
            border-color: #eee;
        }

        .table tbody tr {
            transition: all 0.3s ease;
        }

        .table tbody tr:hover {
            background-color: rgba(114, 9, 183, 0.05);
        }

        .btn-warning {
            background: linear-gradient(135deg, #ffc107 0%, #e0a800 100%);
            border: none;
            color: #212529;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .btn-warning:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(255, 193, 7, 0.3);
        }

        .btn-danger {
            background: linear-gradient(135deg, #dc3545 0%, #b02a37 100%);
            border: none;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .btn-danger:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(220, 53, 69, 0.3);
        }

        .empty-state {
            text-align: center;
            padding: 3rem 2rem;
            color: #6c757d;
            background: white;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
        }

        .empty-state i {
            font-size: 3rem;
            margin-bottom: 1rem;
            color: #adb5bd;
        }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg admin-navbar">
    <div class="container">
        <a class="navbar-brand admin-brand" href="/">
            <i class="bi bi-shield-lock me-2"></i>管理员后台
        </a>
        <div>
            <a href="/admin" class="btn btn-outline-secondary">
                <i class="bi bi-arrow-left me-1"></i>返回
            </a>
        </div>
    </div>
</nav>

<div class="container">
    <h2 class="page-title">
        <i class="bi bi-tags me-2"></i>分类管理
    </h2>

    <div class="search-form">
        <form method="get" action="/admin/category">
            <div class="input-group">
                <input type="text" name="name" class="form-control"
                       placeholder="请输入分类名称查询" th:value="${name}"
                       style="border-radius: 8px 0 0 8px;">
                <button class="btn btn-outline-secondary" type="submit"
                        style="border-radius: 0;">
                    <i class="bi bi-search"></i> 查询
                </button>
                <a href="/admin/category" class="btn btn-outline-primary"
                   style="border-radius: 0 8px 8px 0;">
                    <i class="bi bi-arrow-clockwise"></i> 重置
                </a>
            </div>
        </form>
    </div>

    <div class="form-section">
        <h5 class="mb-3">
            <i class="bi bi-plus-circle me-2"></i>
            <span th:text="${c != null ? '修改分类' : '新增分类'}"></span>
        </h5>
        <form method="post" action="/admin/category">
            <input type="hidden" name="id" th:if="${c != null}" th:value="${c.id}">
            <div class="mb-3">
                <label class="form-label">分类名称</label>
                <input type="text" name="name" class="form-control"
                       th:value="${c != null ? c.name : ''}"
                       placeholder="请输入分类名称" required>
            </div>
            <div class="form-actions">
                <button type="submit" class="btn btn-admin">
                    <i class="bi bi-save me-1"></i>
                    <span th:text="${c != null ? '保存修改' : '添加分类'}"></span>
                </button>
                <a href="/admin/category" class="btn btn-outline-secondary">
                    <i class="bi bi-x-circle me-1"></i>取消
                </a>
            </div>
        </form>
    </div>

    <div th:if="${param.error != null and param.error[0] == 'has_articles'}"
         class="alert alert-danger alert-dismissible fade show" role="alert">
        <i class="bi bi-exclamation-triangle me-2"></i>
        无法删除，该分类下有关联的文章
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div th:if="${list.empty}" class="empty-state">
        <i class="bi bi-tags"></i>
        <h4 class="mt-3">暂无分类</h4>
        <p class="text-muted">还没有添加任何分类，请先添加分类</p>
    </div>

    <div th:unless="${list.empty}">
        <div class="category-table">
            <table class="table table-hover">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>名称</th>
                    <th>操作</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="c:${list}">
                    <td th:text="${c.id}"></td>
                    <td th:text="${c.name}"></td>
                    <td>
                        <a th:href="@{/admin/category/edit/{id}(id=${c.id})}"
                           class="btn btn-warning btn-sm">
                            <i class="bi bi-pencil me-1"></i>编辑
                        </a>
                        <a th:href="@{/admin/category/delete/{id}(id=${c.id})}"
                           class="btn btn-danger btn-sm"
                           onclick="return confirm('删除后不可恢复，确定要删除此分类吗？')">
                            <i class="bi bi-trash me-1"></i>删除
                        </a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
