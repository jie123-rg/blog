<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>管理员后台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        :root {
            --admin-color: #7209b7;
            --secondary-color: #560bad;
            --light-color: #f8f9fa;
            --dark-color: #212529;
        }

        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #e4edf5 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        .admin-navbar {
            background: rgba(255, 255, 255, 0.95) !important;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
            border-bottom: 3px solid var(--admin-color);
        }

        .admin-brand {
            font-weight: 700;
            font-size: 1.5rem;
            background: linear-gradient(135deg, var(--admin-color) 0%, #560bad 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .nav-link {
            color: var(--dark-color) !important;
            font-weight: 500;
            padding: 0.5rem 1rem !important;
            border-radius: 6px;
            transition: all 0.3s ease;
        }

        .nav-link:hover {
            color: var(--admin-color) !important;
            background: rgba(114, 9, 183, 0.08);
        }

        .welcome-section {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            padding: 3rem;
            margin-top: 2rem;
            text-align: center;
            border: 1px solid rgba(0,0,0,0.05);
            border-top: 4px solid var(--admin-color);
        }

        .welcome-icon {
            font-size: 3.5rem;
            background: linear-gradient(135deg, var(--admin-color) 0%, #560bad 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 1.5rem;
        }

        .welcome-title {
            font-weight: 700;
            color: var(--dark-color);
            font-size: 2rem;
            margin-bottom: 1rem;
        }

        .welcome-text {
            color: #6c757d;
            font-size: 1.1rem;
            margin-bottom: 2rem;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        .admin-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
            padding: 2.5rem;
            height: 100%;
            border: 1px solid #eee;
            transition: all 0.3s ease;
            text-align: center;
            border-top: 4px solid var(--admin-color);
        }

        .admin-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(114, 9, 183, 0.15);
            border-color: var(--admin-color);
        }

        .card-icon {
            font-size: 2.8rem;
            color: var(--admin-color);
            margin-bottom: 1.5rem;
        }

        .card-title {
            font-weight: 600;
            color: var(--dark-color);
            font-size: 1.4rem;
            margin-bottom: 1rem;
        }

        .card-text {
            color: #6c757d;
            margin-bottom: 2rem;
            line-height: 1.6;
            font-size: 1rem;
        }

        .btn-admin {
            background: linear-gradient(135deg, var(--admin-color) 0%, #560bad 100%);
            border: none;
            padding: 0.75rem 2rem;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.3s ease;
            color: white;
        }

        .btn-admin:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(114, 9, 183, 0.3);
            color: white;
        }

        .btn-outline-secondary {
            border-width: 2px;
            font-weight: 500;
            border-radius: 6px;
            transition: all 0.3s ease;
        }

        .btn-outline-secondary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(108, 117, 125, 0.2);
        }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg admin-navbar">
    <div class="container">
        <a class="navbar-brand admin-brand" href="/">
            <i class="bi bi-shield-lock me-2"></i>管理员后台
        </a>
        <ul class="navbar-nav ms-auto">
            <li class="nav-item">
                <a class="nav-link" href="/back">
                    <i class="bi bi-arrow-left me-1"></i>返回
                </a>
            </li>
        </ul>
    </div>
</nav>

<div class="container">
    <div class="welcome-section">
        <div class="welcome-icon">
            <i class="bi bi-shield-check"></i>
        </div>
        <h1 class="welcome-title">管理员功能菜单</h1>
        <p class="welcome-text">管理博客系统的各项功能，包括分类管理、文章审核等核心功能</p>
    </div>

    <div class="row mt-5 g-4">
        <div class="col-md-6">
            <div class="admin-card">
                <div class="card-icon">
                    <i class="bi bi-tags"></i>
                </div>
                <h3 class="card-title">分类管理</h3>
                <p class="card-text">管理博客文章分类，包括新增、编辑和删除分类。合理分类有助于用户更好浏览文章。</p>
                <a href="/admin/category" class="btn btn-admin">
                    <i class="bi bi-arrow-right me-2"></i>进入分类管理
                </a>
            </div>
        </div>

        <div class="col-md-6">
            <div class="admin-card">
                <div class="card-icon">
                    <i class="bi bi-clipboard-check"></i>
                </div>
                <h3 class="card-title">文章审核</h3>
                <p class="card-text">审核用户提交的文章，确保内容质量。可通过或拒绝发布，维护博客内容生态。</p>
                <a href="/admin/audit" class="btn btn-admin">
                    <i class="bi bi-arrow-right me-2"></i>进入文章审核
                </a>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
