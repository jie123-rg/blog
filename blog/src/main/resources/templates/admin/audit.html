<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>文章审核</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        :root {
            --admin-color: #7209b7;
            --success-color: #20c997;
            --danger-color: #dc3545;
            --light-color: #f8f9fa;
            --dark-color: #212529;
        }

        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #e4edf5 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        .admin-navbar {
            background: rgba(255, 255, 255, 0.95) !important;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
            border-bottom: 3px solid var(--admin-color);
        }

        .admin-brand {
            font-weight: 700;
            font-size: 1.5rem;
            background: linear-gradient(135deg, var(--admin-color) 0%, #560bad 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .btn-outline-secondary {
            border-width: 2px;
            font-weight: 500;
            border-radius: 6px;
            transition: all 0.3s ease;
        }

        .btn-outline-secondary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(108, 117, 125, 0.2);
        }

        .container {
            padding-top: 2rem;
        }

        .page-title {
            font-weight: 700;
            color: var(--dark-color);
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 3px solid var(--admin-color);
        }

        .audit-table {
            background: white;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
            overflow: hidden;
            border: 1px solid #eee;
        }

        .table {
            margin: 0;
        }

        .table thead {
            background: linear-gradient(135deg, var(--admin-color) 0%, #560bad 100%);
            color: white;
        }

        .table th {
            border: none;
            padding: 1.2rem 1rem;
            font-weight: 600;
        }

        .table td {
            padding: 1.2rem 1rem;
            vertical-align: middle;
            border-color: #eee;
        }

        .table tbody tr {
            transition: all 0.3s ease;
        }

        .table tbody tr:hover {
            background-color: rgba(114, 9, 183, 0.05);
            transform: translateX(5px);
        }

        .btn-success {
            background: linear-gradient(135deg, var(--success-color) 0%, #17a589 100%);
            border: none;
            font-weight: 500;
            padding: 0.5rem 1.5rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }

        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(32, 201, 151, 0.3);
        }

        .btn-danger {
            background: linear-gradient(135deg, var(--danger-color) 0%, #b02a37 100%);
            border: none;
            font-weight: 500;
            padding: 0.5rem 1.5rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }

        .btn-danger:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(220, 53, 69, 0.3);
        }

        .action-buttons {
            display: flex;
            gap: 0.5rem;
        }

        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: #6c757d;
            background: white;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
            margin-top: 2rem;
        }

        .empty-state i {
            font-size: 3rem;
            margin-bottom: 1rem;
            color: #adb5bd;
        }

        .article-title {
            font-weight: 500;
            color: var(--dark-color);
        }

        .article-author {
            color: #6c757d;
            font-size: 0.9rem;
        }

        .article-time {
            color: #adb5bd;
            font-size: 0.85rem;
        }

        .badge-audit {
            padding: 0.25rem 0.75rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .badge-pending {
            background: rgba(255, 193, 7, 0.1);
            color: #e0a800;
            border: 1px solid rgba(224, 168, 0, 0.2);
        }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg admin-navbar">
    <div class="container">
        <a class="navbar-brand admin-brand" href="/">
            <i class="bi bi-shield-lock me-2"></i>管理员后台
        </a>
        <div>
            <a href="/admin" class="btn btn-outline-secondary">
                <i class="bi bi-arrow-left me-1"></i>返回
            </a>
        </div>
    </div>
</nav>

<div class="container">
    <h2 class="page-title">
        <i class="bi bi-clipboard-check me-2"></i>待审核文章
        <span th:if="${!list.empty}" class="badge badge-audit badge-pending ms-2">
            <span th:text="${list.size()}"></span> 篇待审
        </span>
    </h2>

    <div th:if="${list.empty}" class="empty-state">
        <i class="bi bi-clipboard-check"></i>
        <h4 class="mt-3">暂无待审核文章</h4>
        <p class="text-muted">所有文章都已审核完毕</p>
        <a href="/admin" class="btn btn-outline-secondary mt-3">
            <i class="bi bi-arrow-left me-1"></i>返回管理首页
        </a>
    </div>

    <div th:unless="${list.empty}">
        <div class="audit-table">
            <table class="table table-hover">
                <thead>
                <tr>
                    <th width="40%">标题</th>
                    <th width="20%">作者</th>
                    <th width="20%">提交时间</th>
                    <th width="20%">审核操作</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="a:${list}">
                    <td>
                        <div class="article-title" th:text="${a.title}"></div>
                    </td>
                    <td>
                        <div class="article-author" th:text="${authorMap.get(a.authorId)} ?: ('用户' + ${a.authorId})">
                    </td>
                    <td>
                        <div class="article-time" th:text="${#temporals.format(a.createTime,'MM-dd HH:mm')}"></div>
                    </td>
                    <td>
                        <div class="action-buttons">
                            <button class="btn btn-success" th:onclick="audit([[${a.id}]],1)">
                                <i class="bi bi-check-circle me-1"></i>通过
                            </button>
                            <button class="btn btn-danger" th:onclick="audit([[${a.id}]],2)">
                                <i class="bi bi-x-circle me-1"></i>拒绝
                            </button>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    function audit(id, status) {
        const action = status === 1 ? '通过' : '拒绝';
        if (confirm(`确定要${action}这篇文章吗？`)) {
            fetch('/admin/audit', {
                method: 'POST',
                headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                body: 'id=' + id + '&status=' + status
            }).then(response => {
                if (response.ok) {
                    location.reload();
                } else {
                    alert('操作失败，请重试');
                }
            }).catch(error => {
                alert('网络错误，请重试');
            });
        }
    }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
