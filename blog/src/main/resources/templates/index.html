<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>个人博客</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        :root {
            --primary-color: #4361ee;
            --secondary-color: #3a0ca3;
            --accent-color: #4cc9f0;
            --light-color: #f8f9fa;
            --dark-color: #212529;
            --gray-color: #6c757d;
            --card-shadow: 0 10px 30px rgba(0,0,0,0.08);
            --hover-shadow: 0 15px 40px rgba(67, 97, 238, 0.15);
            --gradient-primary: linear-gradient(135deg, #4361ee 0%, #3a0ca3 100%);
            --gradient-light: linear-gradient(135deg, #f5f7fa 0%, #e4edf5 100%);
        }

        body {
            background: var(--gradient-light);
            min-height: 100vh;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            line-height: 1.6;
        }

        /* 导航栏样式增强 */
        .navbar {
            background: rgba(255, 255, 255, 0.95) !important;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
            border-bottom: 1px solid rgba(67, 97, 238, 0.1);
            padding: 0.8rem 0;
            transition: all 0.3s ease;
        }

        .navbar.scrolled {
            padding: 0.5rem 0;
            box-shadow: 0 6px 25px rgba(0,0,0,0.08);
        }

        .navbar-brand {
            font-weight: 700;
            font-size: 1.5rem;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            padding: 0.5rem 0;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: transform 0.3s ease;
        }

        .navbar-brand:hover {
            transform: scale(1.05);
        }

        .nav-link {
            color: var(--dark-color) !important;
            font-weight: 500;
            padding: 0.5rem 1rem !important;
            margin: 0 0.2rem;
            border-radius: 6px;
            transition: all 0.3s ease;
            position: relative;
        }

        .nav-link:hover, .nav-link.active {
            color: var(--primary-color) !important;
            background: rgba(67, 97, 238, 0.08);
            transform: translateY(-1px);
        }

        .nav-link::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 0;
            height: 2px;
            background: var(--primary-color);
            transition: all 0.3s ease;
            transform: translateX(-50%);
        }

        .nav-link:hover::after, .nav-link.active::after {
            width: 70%;
        }

        /* 主要内容区域 */
        .container {
            padding: 3rem 0;
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .section-title {
            font-weight: 700;
            color: var(--dark-color);
            margin-bottom: 2.5rem;
            padding-bottom: 1rem;
            position: relative;
            font-size: 1.8rem;
            display: inline-block;
        }

        .section-title::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 60px;
            height: 4px;
            background: var(--gradient-primary);
            border-radius: 2px;
        }

        /* 博客卡片样式增强 */
        .blog-card {
            background: white;
            border-radius: 12px;
            border: none;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.1);
            box-shadow: var(--card-shadow);
            overflow: hidden;
            margin-bottom: 2rem;
            border: 1px solid rgba(0,0,0,0.05);
            position: relative;
        }

        .blog-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: var(--gradient-primary);
            transform: scaleX(0);
            transition: transform 0.4s ease;
            transform-origin: left center;
        }

        .blog-card:hover::before {
            transform: scaleX(1);
        }

        .blog-card:hover {
            transform: translateY(-8px);
            box-shadow: var(--hover-shadow);
            border-color: rgba(67, 97, 238, 0.2);
        }

        .card-body {
            padding: 2rem;
        }

        .card-title {
            font-weight: 700;
            color: var(--dark-color);
            font-size: 1.5rem;
            line-height: 1.4;
            margin-bottom: 1.2rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            transition: color 0.3s ease;
        }

        .blog-card:hover .card-title {
            color: var(--primary-color);
        }

        .card-meta {
            color: var(--gray-color);
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px dashed rgba(0,0,0,0.08);
        }

        .card-meta i {
            margin-right: 0.4rem;
            color: var(--primary-color);
        }

        .meta-item {
            display: inline-flex;
            align-items: center;
            margin-right: 1.5rem;
            transition: color 0.3s ease;
        }

        .blog-card:hover .meta-item {
            color: var(--primary-color);
        }

        /* 分类标签特殊样式 */
        .category-tag {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
            background: rgba(67, 97, 238, 0.1);
            color: var(--primary-color);
            margin-left: 0.5rem;
            transition: all 0.3s ease;
        }

        .blog-card:hover .category-tag {
            background: var(--primary-color);
            color: white;
        }

        .btn-read-more {
            background: var(--gradient-primary);
            border: none;
            color: white;
            padding: 0.6rem 1.5rem;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            position: relative;
            overflow: hidden;
        }

        .btn-read-more::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: rgba(255,255,255,0.2);
            transition: all 0.4s ease;
            transform: skewX(-20deg);
        }

        .btn-read-more:hover::after {
            left: 120%;
        }

        .btn-read-more:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(67, 97, 238, 0.3);
            color: white;
        }

        /* 分页样式增强 */
        .pagination {
            margin-top: 3rem;
        }

        .page-link {
            border: none;
            color: var(--gray-color);
            background: white;
            margin: 0 4px;
            border-radius: 8px !important;
            padding: 0.6rem 1.2rem;
            font-weight: 500;
            transition: all 0.3s ease;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }

        .page-link:hover {
            background: var(--gradient-primary);
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(67, 97, 238, 0.3);
        }

        .page-item.disabled .page-link {
            opacity: 0.5;
            background: #f8f9fa;
            color: #adb5bd;
            box-shadow: none;
        }

        .pagination-info {
            text-align: center;
            color: var(--gray-color);
            margin-top: 1rem;
            font-size: 0.9rem;
            padding: 0.5rem;
            background: rgba(255,255,255,0.8);
            border-radius: 8px;
            display: inline-block;
            margin-left: 50%;
            transform: translateX(-50%);
        }

        /* 用户区域样式 */
        .user-area {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .welcome-text {
            font-weight: 500;
            color: var(--dark-color);
            padding: 0.5rem 1rem;
            background: rgba(67, 97, 238, 0.08);
            border-radius: 8px;
            border-left: 3px solid var(--primary-color);
            transition: all 0.3s ease;
        }

        .welcome-text:hover {
            background: rgba(67, 97, 238, 0.12);
            transform: translateY(-2px);
        }

        .btn-outline-primary {
            border: 2px solid var(--primary-color);
            color: var(--primary-color);
            font-weight: 500;
            padding: 0.5rem 1.2rem;
            border-radius: 8px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            z-index: 1;
        }

        .btn-outline-primary::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 0;
            height: 100%;
            background: var(--primary-color);
            transition: width 0.3s ease;
            z-index: -1;
        }

        .btn-outline-primary:hover::before {
            width: 100%;
        }

        .btn-outline-primary:hover {
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(67, 97, 238, 0.3);
        }

        .btn-back {
            background: #f8f9fa;
            border: 2px solid #e9ecef;
            color: var(--dark-color);
        }

        .btn-back:hover {
            background: #e9ecef;
            border-color: #dee2e6;
            transform: translateY(-2px);
        }

        /* 响应式调整 */
        @media (max-width: 768px) {
            .container {
                padding: 1.5rem 1rem;
            }

            .section-title {
                font-size: 1.5rem;
                margin-bottom: 1.5rem;
            }

            .card-body {
                padding: 1.25rem;
            }

            .user-area {
                flex-wrap: wrap;
                justify-content: center;
            }

            .welcome-text {
                text-align: center;
                margin-bottom: 0.5rem;
                width: 100%;
            }

            .navbar-nav {
                margin-top: 1rem;
            }

            .nav-link {
                margin: 0.2rem 0;
            }

            .meta-item {
                display: block;
                margin-bottom: 0.5rem;
            }
        }

        /* 动画效果增强 */
        .fade-in-up {
            animation: fadeInUp 0.6s ease-out forwards;
            opacity: 0;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 延迟动画 */
        .blog-card:nth-child(1) { animation-delay: 0.1s; }
        .blog-card:nth-child(2) { animation-delay: 0.2s; }
        .blog-card:nth-child(3) { animation-delay: 0.3s; }
        .blog-card:nth-child(4) { animation-delay: 0.4s; }
        .blog-card:nth-child(5) { animation-delay: 0.5s; }

        /* 页面加载动画 */
        .loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.3s ease;
        }

        .loader-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            position: relative;
        }

        .loader-spinner::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 60px;
            height: 60px;
            border: 2px solid rgba(67, 97, 238, 0.2);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            animation: spinReverse 2s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes spinReverse {
            0% { transform: translate(-50%, -50%) rotate(0deg); }
            100% { transform: translate(-50%, -50%) rotate(-360deg); }
        }

        /* 自定义滚动条 */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--primary-color);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--secondary-color);
        }

        /* 回到顶部按钮 */
        .back-to-top {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            width: 45px;
            height: 45px;
            background: var(--primary-color);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 12px rgba(67, 97, 238, 0.3);
            cursor: pointer;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            z-index: 100;
        }

        .back-to-top.show {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .back-to-top:hover {
            background: var(--secondary-color);
            transform: translateY(-3px);
        }
    </style>
</head>
<body>
<!-- 加载动画 -->
<div class="loader" id="loader">
    <div class="loader-spinner"></div>
</div>

<!-- 回到顶部按钮 -->
<div class="back-to-top" id="backToTop" onclick="scrollToTop()">
    <i class="bi bi-arrow-up"></i>
</div>

<nav class="navbar navbar-expand-lg navbar-light sticky-top" id="mainNav">
    <div class="container">
        <a class="navbar-brand" href="/">
            <i class="bi bi-pen me-2"></i>我的博客
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link active" href="/">
                        <i class="bi bi-house-door me-1"></i>首页
                    </a>
                </li>
                <li th:each="c:${categories}" class="nav-item">
                    <a class="nav-link" th:href="@{/(categoryId=${c.id})}" th:text="${c.name}"></a>
                </li>
            </ul>
            <div class="user-area">
                <!-- 未登录 -->
                <div th:if="${session.loginUser == null}">
                    <a class="btn btn-outline-primary me-2" href="/login">
                        <i class="bi bi-box-arrow-in-right me-1"></i>登录
                    </a>
                    <a class="btn btn-outline-primary" href="/register">
                        <i class="bi bi-person-plus me-1"></i>注册
                    </a>
                </div>
                <!-- 已登录 -->
                <div th:if="${session.loginUser != null}" class="d-flex align-items-center gap-3">
                    <span class="welcome-text">
                        <i class="bi bi-person-circle me-2"></i>
                        <span th:text="${session.loginUser.username}"></span>
                    </span>
                    <div class="d-flex gap-2">
                        <a class="btn btn-back" th:href="${#request.requestURI == '/home' ? '/login' : '/back'}">
                            <i class="bi bi-arrow-left me-1"></i>返回
                        </a>
                        <a class="btn btn-outline-primary"
                           th:href="${session.loginUser.role == 2} ? '/admin' : '/user/dashboard'">
                            <i class="bi bi-gear me-1"></i>后台管理
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</nav>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-10">
            <h1 class="section-title">探索精彩文章</h1>

            <!-- 博客列表 -->
            <div class="row">
                <div class="col-12">
                    <div class="blog-card fade-in-up" th:each="a:${page.records}">
                        <div class="card-body">
                            <h5 class="card-title" th:text="${a.title}"></h5>
                            <div class="card-meta">
                                <span class="meta-item">
                                    <i class="bi bi-calendar3"></i>
                                    <span th:text="${#temporals.format(a.createTime,'yyyy-MM-dd HH:mm')}"></span>
                                </span>
                                <span class="meta-item">
                                    <i class="bi bi-folder2"></i>
                                    <span th:text="${cateMap[a.categoryId]}"></span>
                                    <span class="category-tag" th:text="${cateMap[a.categoryId]}"></span>
                                </span>
                                <span class="meta-item">
                                    <i class="bi bi-eye"></i>
                                    <span th:text="${a.viewNum}"></span> 阅读
                                </span>
                            </div>
                            <a th:href="@{/article/{id}(id=${a.id})}" class="btn btn-read-more">
                                阅读全文
                                <i class="bi bi-arrow-right"></i>
                            </a>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 分页 -->
            <nav aria-label="文章分页">
                <ul class="pagination justify-content-center">
                    <li class="page-item" th:classappend="${!page.hasPrevious()}?'disabled':''">
                        <a class="page-link" th:href="@{/(current=${page.current-1},categoryId=${param.categoryId})}">
                            <i class="bi bi-chevron-left me-1"></i>上一页
                        </a>
                    </li>
                    <li class="page-item" th:classappend="${!page.hasNext()}?'disabled':''">
                        <a class="page-link" th:href="@{/(current=${page.current+1},categoryId=${param.categoryId})}">
                            下一页
                            <i class="bi bi-chevron-right ms-1"></i>
                        </a>
                    </li>
                </ul>
                <div class="pagination-info">
                    第 <span th:text="${page.current}"></span> 页，共 <span th:text="${page.pages}"></span> 页，
                    总计 <span th:text="${page.total}"></span> 篇文章
                </div>
            </nav>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // 页面加载完成时隐藏加载动画
    window.addEventListener('load', function() {
        setTimeout(function() {
            document.getElementById('loader').style.opacity = '0';
            setTimeout(function() {
                document.getElementById('loader').style.display = 'none';
            }, 300);
        }, 500);

        // 为卡片添加动画
        const cards = document.querySelectorAll('.blog-card');
        cards.forEach((card, index) => {
            card.style.animationDelay = `${0.1 + index * 0.1}s`;
            card.classList.add('fade-in-up');
        });
    });

    // 导航栏滚动效果
    window.addEventListener('scroll', function() {
        const nav = document.getElementById('mainNav');
        const backToTop = document.getElementById('backToTop');

        if (window.scrollY > 50) {
            nav.classList.add('scrolled');
            backToTop.classList.add('show');
        } else {
            nav.classList.remove('scrolled');
            backToTop.classList.remove('show');
        }
    });

    // 平滑滚动到顶部
    function scrollToTop() {
        window.scrollTo({
            top: 0,
            behavior: 'smooth'
        });
    }

    // 分类导航激活状态
    document.addEventListener('DOMContentLoaded', function() {
        const currentUrl = window.location.href;
        const navLinks = document.querySelectorAll('.nav-link');

        navLinks.forEach(link => {
            if (link.href === currentUrl) {
                link.classList.add('active');
            }
        });
    });
</script>
</body>
</html>
